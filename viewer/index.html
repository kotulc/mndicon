<!doctype html>
<!-- mndicon viewer: dark/light page theme (dark default), Nextra-style H/S/L
     color sliders for primary (bg) and secondary (fg), preset swatches.
     One square card per composition template: light/dark favicon+icon panels
     on the left, that template's own layer controls (always visible, icon
     dropdown last) on the right. Clicking a template card selects it, which
     feeds its live-tuned ("flattened") icon into a trailing logo card — the
     final icon + title, with optional rect/circle background shapes and the
     title's per-part controls, all listed below its light/dark canvas.
     Mask ids are made unique per injected svg copy so cutouts render in every
     instance. Tuned SVGs are serialized on save (favicons rasterized here). -->
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mndicon</title>
<style>
  :root { color-scheme: dark; font-family: Avenir, Montserrat, Corbel, 'Segoe UI', sans-serif;
          --pg: #131316; --pg-card: #1d1d21; --pg-border: #33333a;
          --pg-text: #fafafa; --pg-muted: #a1a1aa }
  html[data-theme=light] { color-scheme: light;
          --pg: #f4f4f5; --pg-card: #ffffff; --pg-border: #e4e4e7;
          --pg-text: #18181b; --pg-muted: #71717a }
  * { box-sizing: border-box; margin: 0 }
  body { background: var(--pg); color: var(--pg-text) }

  header { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; padding: 12px 20px;
           background: var(--pg-card); color: var(--pg-text); border-bottom: 1px solid var(--pg-border) }
  header h1 { font-size: 18px; font-weight: 700; margin-right: auto }
  header label { display: flex; align-items: center; gap: 6px; font-size: 13px }
  header input[type=number] { width: 110px; padding: 6px 8px; border: 1px solid var(--pg-border);
                              border-radius: 6px; background: var(--pg); color: var(--pg-text); font: inherit }
  header button { padding: 6px 14px; border: 0; border-radius: 6px; background: var(--pg-text);
                  color: var(--pg-card); font: inherit; font-weight: 600; cursor: pointer }
  #theme-toggle { background: var(--pg); color: var(--pg-text); border: 1px solid var(--pg-border) }
  header h1 svg { height: 32px; display: block }
  .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; padding: 0 }
  .swatch.active { border-color: #fafafa }

  #tuner { max-width: 1100px; margin: 12px auto 0; padding: 0 20px; font-size: 13px }
  #tuner h3 { font-size: 12px; font-weight: 600; color: var(--pg-muted); margin: 10px 0 4px;
              text-transform: uppercase; letter-spacing: 0.04em }
  .rows { background: var(--pg-card); border: 1px solid var(--pg-border);
          border-radius: 10px; padding: 6px 14px; font-size: 13px }
  .row { display: grid; grid-template-columns: 74px 1fr; align-items: start; gap: 12px; padding: 6px 0 }
  .row.icon-row { grid-template-columns: 28px 1fr }
  .row + .row { border-top: 1px solid var(--pg-border) }
  .row b { font-weight: 600; color: var(--pg-text) }
  .row .thumb { width: 22px; height: 22px; color: var(--pg-text) }
  .row .fields { display: flex; flex-wrap: wrap; align-items: center; gap: 12px }
  .row label { display: flex; align-items: center; gap: 5px; color: var(--pg-muted) }
  .row input[type=range] { width: 84px }
  .row select { font: inherit; padding: 2px 4px; max-width: 150px; background: var(--pg-card);
                color: var(--pg-text); border: 1px solid var(--pg-border); border-radius: 4px }
  .chip { width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--pg-border) }
  .ink-btn { width: 18px; height: 18px; padding: 0; border-radius: 4px; cursor: pointer;
             border: 2px solid var(--pg-border) }
  .ink-btn.active { border-color: var(--pg-text) }
  .ink-btn[data-ink=bg] { background: var(--bg) }
  .ink-btn[data-ink=fg] { background: var(--fg) }
  .ink-btn[data-ink=ac] { background: var(--ac) }

  main { display: grid; gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto }
  .card { background: var(--pg-card); border: 1px solid var(--pg-border); border-radius: 12px;
          padding: 16px; cursor: pointer }
  .card.selected { border-color: var(--pg-text); box-shadow: 0 0 0 1px var(--pg-text) }
  .card.logo { cursor: default }
  .card .head { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px;
                font-weight: 600; color: var(--pg-muted) }
  .card .save { margin-left: auto; padding: 5px 14px; border: 1px solid var(--pg-muted);
                border-radius: 6px; background: transparent; color: var(--pg-text);
                font: inherit; font-size: 13px; cursor: pointer }

  .body { display: flex; gap: 16px }
  .canvas { display: flex; flex-direction: row; gap: 10px; flex-shrink: 0 }
  .controls { flex: 1; min-width: 0 }
  .controls .rows { padding: 2px 14px }

  .panel { border-radius: 8px; padding: 14px; display: flex; align-items: center; gap: 14px }
  .panel.light { background: #fafafa; border: 1px solid #e4e4e7; color: #18181b }
  .panel.dark  { background: #202023; border: 1px solid #33333a; color: #fafafa }
  .canvas .panel { flex-direction: column; width: 170px }
  .favs { display: flex; align-items: center; gap: 8px }
  .canvas .favs { flex-direction: row }
  .favs .f32 svg { width: 32px; height: 32px }
  .favs .f16 svg { width: 16px; height: 16px }
  .main { flex: 1; display: flex; justify-content: center; min-width: 0 }
  .main svg { height: 96px; max-width: 100% }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px }

  #status { position: fixed; bottom: 16px; right: 16px; background: #18181b; color: #fafafa;
            border: 1px solid #52525b; padding: 10px 16px; border-radius: 8px; font-size: 13px;
            display: none }
</style>
</head>
<body>
<header>
  <h1 id="brand">mndicon</h1>
  <label for="seed">seed</label>
  <input id="seed" type="number" placeholder="random">
  <button id="regen">Regenerate</button>
  <button id="theme-toggle" title="page theme">☀</button>
</header>
<div id="tuner">
  <h3>colors</h3>
  <div class="rows" id="color-rows"></div>
</div>
<main id="grid"></main>
<div id="status"></div>

<script>
let state = null                              // last /api payload
let selected = 0                              // index of the selected template card (feeds the logo card's icon)
// Colors as Nextra-style hue/saturation/lightness; primary = bg, secondary = fg, accent = ac
let current = { scheme: 'grey', fg: { h: 0, s: 0, l: 98 }, bg: { h: 240, s: 5, l: 34 }, ac: { h: 0, s: 0, l: 0 } }
const comps = {}                              // cand index -> role -> tuner state (incl. ink: 'fg'|'bg'|null)
const chosen = {}                             // cand index -> role -> icon name override
const parts = []                              // title part -> { show, ink, weight, scale, dx, typeset }
// Logo-card-only components: the flattened selected icon plus optional bg shapes
const logo = {
  flat:   { show: true, scale: 1, dx: 0, dy: 0 },
  rect:   { show: false, ink: 'bg', w: 1, h: 1, rx: 14, dx: 0, dy: 0 },
  circle: { show: false, ink: 'bg', scale: 1, dx: 0, dy: 0 },
}
let title_markup = null                       // cached <text data-role="title">...</text>, same for every candidate

const ROLE_ORDER = ['solid', 'frame', 'fore']
const WEIGHTS = [400, 500, 600, 700, 800]

async function api(url, body) {
  const res = await fetch(url, body ? { method: 'POST', body: JSON.stringify(body) } : {})
  const data = await res.json()
  if (!res.ok) throw new Error(data.error || res.statusText)
  return data
}

// --- Color helpers ---

function css_hsl(c) {
  return `hsl(${c.h} ${c.s}% ${c.l}%)`
}

const INK_FALLBACK = { fg: '#fafafa', bg: '#52525b', ac: '#000000' }

function ink_css(slot) {
  return `var(--${slot}, ${INK_FALLBACK[slot]})`
}

function parse_hsl(color) {
  // Parse an hsl(...) string or hex color into { h, s, l }
  const m = color.match(/hsl\((\d+)[ ,]+(\d+)%[ ,]+(\d+)%\)/)
  if (m) return { h: +m[1], s: +m[2], l: +m[3] }
  const n = parseInt(color.slice(1), 16)
  const r = (n >> 16 & 255) / 255, g = (n >> 8 & 255) / 255, b = (n & 255) / 255
  const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min
  const l = (max + min) / 2
  if (!d) return { h: 0, s: 0, l: Math.round(l * 100) }
  const s = d / (1 - Math.abs(2 * l - 1))
  let h = max === r ? ((g - b) / d) % 6 : max === g ? (b - r) / d + 2 : (r - g) / d + 4
  return { h: Math.round(((h * 60) + 360) % 360), s: Math.round(s * 100), l: Math.round(l * 100) }
}

// --- Rendering ---

function instance(svg, n) {
  // Unique mask ids per injected copy: browsers resolve url(#id) document-wide
  // and fail to apply masks across separate inline svg fragments
  return svg.replace(/c(\d+)-cut(\d+)/g, `c$1-cut$2-i${n}`)
}

function render() {
  document.getElementById('seed').value = state.seed
  const grid = document.getElementById('grid')
  grid.innerHTML = ''
  state.candidates.forEach(cand => grid.appendChild(card(cand)))
  grid.appendChild(logo_card())
  select(Math.min(selected, state.candidates.length - 1))
}

function card(cand) {
  const el = document.createElement('div')
  el.className = 'card'
  el.dataset.index = cand.index
  el.innerHTML = `<div class="head">#${cand.index + 1} · ${cand.template}</div>
    <div class="body">
      <div class="canvas">
        ${['light', 'dark'].map((mode, m) => `
          <div class="panel ${mode}">
            <div class="favs">
              <span class="f32">${instance(cand.svg_icon, m * 3)}</span>
              <span class="f16">${instance(cand.svg_icon, m * 3 + 1)}</span>
            </div>
            <div class="main">${instance(cand.svg_icon, m * 3 + 2)}</div>
          </div>`).join('')}
      </div>
      <div class="controls"><div class="rows"></div></div>
    </div>`
  el.onclick = () => select(cand.index)
  render_comp_rows(cand.index, el.querySelector('.rows'))

  // Re-apply any icon overrides chosen before this re-render
  for (const [role, name] of Object.entries(chosen[cand.index] || {})) swap_icon(el, role, name)
  return el
}

function select(index) {
  selected = index
  document.querySelectorAll('.card[data-index]').forEach(el => {
    el.classList.toggle('selected', +el.dataset.index === index)
  })
  apply()
}

// --- Color rows (global, Nextra-style H/S/L per slot) ---

function render_color_rows() {
  const box = document.getElementById('color-rows')
  box.innerHTML = ''

  const theme_row = document.createElement('div')
  theme_row.className = 'row'
  theme_row.innerHTML = `<b>themes</b><div class="fields"></div>`
  const fields = theme_row.querySelector('.fields')
  state.schemes.forEach(scheme => {
    const btn = document.createElement('button')
    btn.className = 'swatch'
    btn.title = scheme.name
    btn.dataset.name = scheme.name
    btn.style.background = `linear-gradient(135deg, ${scheme.bg} 60%, ${scheme.fg} 60%)`
    btn.onclick = () => set_scheme(scheme)
    fields.appendChild(btn)
  })
  box.appendChild(theme_row)

  for (const [label, slot] of [['primary', 'bg'], ['secondary', 'fg'], ['accent', 'ac']]) {
    const c = current[slot]
    const row = document.createElement('div')
    row.className = 'row'
    row.dataset.slot = slot
    row.innerHTML = `<b>${label}</b>
      <div class="fields">
        <label>hue <input type="range" data-k="h" min="0" max="360" value="${c.h}"></label>
        <label>saturation <input type="range" data-k="s" min="0" max="100" value="${c.s}"></label>
        <label>lightness <input type="range" data-k="l" min="0" max="100" value="${c.l}"></label>
        <span class="chip"></span>
      </div>`
    row.querySelectorAll('input').forEach(input => {
      input.oninput = () => {
        current[slot][input.dataset.k] = +input.value
        current.scheme = 'custom'
        apply_colors()
      }
    })
    box.appendChild(row)
  }
  apply_colors()
}

function apply_colors() {
  // Set on body (not just #grid) so tuner ink swatches, a #grid sibling, can read them too
  document.body.style.setProperty('--fg', css_hsl(current.fg))
  document.body.style.setProperty('--bg', css_hsl(current.bg))
  document.body.style.setProperty('--ac', css_hsl(current.ac))
  document.querySelectorAll('#color-rows .row[data-slot]').forEach(row => {
    const c = current[row.dataset.slot]
    row.querySelectorAll('input').forEach(input => { input.value = c[input.dataset.k] })
    row.querySelector('.chip').style.background = css_hsl(c)
  })
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.name === current.scheme)
  })
}

function set_scheme(scheme) {
  // Presets only define primary/secondary; accent is independent and stays as-is
  current = { scheme: scheme.name, fg: parse_hsl(scheme.fg), bg: parse_hsl(scheme.bg), ac: current.ac }
  apply_colors()
}

// --- Shared row controls (icon layers, logo components, and title parts all use this) ---

function ink_html() {
  // Swatches assigning this component to the primary (bg), secondary (fg), or accent (ac) color
  return `<label>color
    <button type="button" class="ink-btn" data-ink="bg" title="primary"></button>
    <button type="button" class="ink-btn" data-ink="fg" title="secondary"></button>
    <button type="button" class="ink-btn" data-ink="ac" title="accent"></button>
  </label>`
}

function wire_row(row, s, handlers = {}) {
  // Standard inputs write straight into state s; string-valued selects (icon,
  // typeset) and the ink swatches go through explicit handlers/state.ink instead
  row.querySelectorAll('input, select').forEach(input => {
    const k = input.dataset.k
    if (k === 'icon' || k === 'typeset') { input.onchange = () => handlers[k](input.value); return }
    input.oninput = () => {
      s[k] = input.type === 'checkbox' ? input.checked : +input.value
      apply()
    }
  })
  row.querySelectorAll('.ink-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.ink === s.ink)
    btn.onclick = () => {
      s.ink = btn.dataset.ink
      row.querySelectorAll('.ink-btn').forEach(b => b.classList.toggle('active', b.dataset.ink === s.ink))
      apply()
    }
  })
}

// --- Per-template icon layer controls (always visible, follow their own card) ---

function comp_state(index, role, init) {
  const c = comps[index] || (comps[index] = {})
  if (!c[role]) c[role] = { show: true, ink: 'bg', scale: 1, dx: 0, dy: 0, ...init }
  return c[role]
}

function render_comp_rows(index, container) {
  const cand = state.candidates[index]
  const card_el = container.closest('.card')
  const roles = [...new Set([...card_el.querySelectorAll('[data-role]')].map(n => n.dataset.role))]
  container.innerHTML = ''

  for (const role of ROLE_ORDER.filter(r => roles.includes(r))) {
    // A cut (subtractive mask) layer has no fill of its own (raw #000 inside its
    // <mask>) and gets no color control; painted layers carry fill="var(--fg/bg)"
    const fill = card_el.querySelector(`[data-role="${role}"]`).getAttribute('fill') || ''
    const paintable = fill.startsWith('var(')
    const c = comp_state(index, role, { ink: paintable ? (fill.includes('--fg') ? 'fg' : 'bg') : null })
    const name = (chosen[index] || {})[role] || cand.icons[role]
    const row = document.createElement('div')
    row.className = 'row icon-row'
    row.innerHTML = `<svg data-thumb="${role}" viewBox="0 0 16 16" class="thumb" fill="currentColor">${state.icon_bodies[name]}</svg>
      <div class="fields">
        <label>show <input type="checkbox" data-k="show" ${c.show ? 'checked' : ''}></label>
        <label>size <input type="range" data-k="scale" min="0.25" max="1.75" step="0.05" value="${c.scale}"></label>
        <label>x <input type="range" data-k="dx" min="-48" max="48" value="${c.dx}"></label>
        <label>y <input type="range" data-k="dy" min="-48" max="48" value="${c.dy}"></label>
        <label>icon <select data-k="icon">
          ${state.icon_roles[role].map(n => `<option ${n === ((chosen[index] || {})[role] || cand.icons[role]) ? 'selected' : ''}>${n}</option>`).join('')}
        </select></label>
        ${paintable ? ink_html() : ''}
      </div>`
    wire_row(row, c, { icon: name => set_icon(index, role, name) })
    container.appendChild(row)
  }
}

function set_icon(index, role, name) {
  (chosen[index] || (chosen[index] = {}))[role] = name
  const card_el = document.querySelector(`.card[data-index="${index}"]`)
  swap_icon(card_el, role, name)
  const thumb = card_el.querySelector(`[data-thumb="${role}"]`)
  if (thumb) thumb.innerHTML = state.icon_bodies[name]
  apply()
}

function swap_icon(el, role, name) {
  // Swap the icon markup in every copy of the layer (incl. inside cutout masks)
  el.querySelectorAll(`g[data-role="${role}"]`).forEach(g => { g.innerHTML = state.icon_bodies[name] })
}

// --- Title part controls ---

function render_part_rows(container) {
  state.title_parts.forEach((text, i) => {
    const p = parts[i] || (parts[i] = { show: true, weight: 600, scale: 1, dx: 0, typeset: 'geometric' })
    const row = document.createElement('div')
    row.className = 'row'
    row.innerHTML = `<b>“${text}”</b>
      <div class="fields">
        <label>show <input type="checkbox" data-k="show" ${p.show ? 'checked' : ''}></label>
        <label>size <input type="range" data-k="scale" min="0.4" max="1.6" step="0.05" value="${p.scale}"></label>
        <label>x <input type="range" data-k="dx" min="-40" max="40" value="${p.dx}"></label>
        <label>weight <select data-k="weight">
          ${WEIGHTS.map(w => `<option ${w === p.weight ? 'selected' : ''}>${w}</option>`).join('')}
        </select></label>
        <label>typeset <select data-k="typeset">
          ${Object.keys(state.typesets).map(t => `<option ${t === p.typeset ? 'selected' : ''}>${t}</option>`).join('')}
        </select></label>
      </div>`
    wire_row(row, p, { typeset: t => { p.typeset = t; apply() } })
    container.appendChild(row)
  })
}

// --- Logo card: flattened selected icon + optional bg shapes + title, all controls below ---

function logo_card() {
  const el = document.createElement('div')
  el.className = 'card logo'
  el.id = 'logo-card'
  el.innerHTML = `<div class="head">logo <button class="save">Save</button></div>
    <div class="panels">
      <div class="panel light"><div class="main"></div></div>
      <div class="panel dark"><div class="main"></div></div>
    </div>
    <div class="rows"></div>`
  el.querySelector('.save').onclick = save_logo

  const rows = el.querySelector('.rows')
  const flat_row = document.createElement('div')
  flat_row.className = 'row'
  flat_row.innerHTML = `<b>icon</b>
    <div class="fields">
      <label>show <input type="checkbox" data-k="show" ${logo.flat.show ? 'checked' : ''}></label>
      <label>size <input type="range" data-k="scale" min="0.25" max="1.75" step="0.05" value="${logo.flat.scale}"></label>
      <label>x <input type="range" data-k="dx" min="-48" max="48" value="${logo.flat.dx}"></label>
      <label>y <input type="range" data-k="dy" min="-48" max="48" value="${logo.flat.dy}"></label>
    </div>`
  wire_row(flat_row, logo.flat)
  rows.appendChild(flat_row)

  const circle_row = document.createElement('div')
  circle_row.className = 'row'
  circle_row.innerHTML = `<b>circle</b>
    <div class="fields">
      <label>show <input type="checkbox" data-k="show" ${logo.circle.show ? 'checked' : ''}></label>
      <label>size <input type="range" data-k="scale" min="0.25" max="1.75" step="0.05" value="${logo.circle.scale}"></label>
      <label>x <input type="range" data-k="dx" min="-48" max="48" value="${logo.circle.dx}"></label>
      <label>y <input type="range" data-k="dy" min="-48" max="48" value="${logo.circle.dy}"></label>
      ${ink_html()}
    </div>`
  wire_row(circle_row, logo.circle)
  rows.appendChild(circle_row)

  const rect_row = document.createElement('div')
  rect_row.className = 'row'
  rect_row.innerHTML = `<b>rect</b>
    <div class="fields">
      <label>show <input type="checkbox" data-k="show" ${logo.rect.show ? 'checked' : ''}></label>
      <label>width <input type="range" data-k="w" min="0.1" max="1.5" step="0.05" value="${logo.rect.w}"></label>
      <label>height <input type="range" data-k="h" min="0.1" max="1.5" step="0.05" value="${logo.rect.h}"></label>
      <label>x <input type="range" data-k="dx" min="-48" max="48" value="${logo.rect.dx}"></label>
      <label>y <input type="range" data-k="dy" min="-48" max="48" value="${logo.rect.dy}"></label>
      ${ink_html()}
      <label>round <input type="range" data-k="rx" min="0" max="48" value="${logo.rect.rx}"></label>
    </div>`
  wire_row(rect_row, logo.rect)
  rows.appendChild(rect_row)

  render_part_rows(rows)
  return el
}

function extract_title() {
  // Cache the title markup: identical across every candidate's svg_logo, and
  // static for the whole session (title doesn't change on regenerate)
  if (!title_markup) {
    const doc = new DOMParser().parseFromString(state.candidates[0].svg_logo, 'image/svg+xml')
    title_markup = doc.querySelector('[data-role="title"]').outerHTML
  }
  return title_markup
}

function rebuild_logo_dom() {
  const logo_card_el = document.getElementById('logo-card')
  const src = document.querySelector(`.card[data-index="${selected}"] .panel.light .main svg`)
  if (!logo_card_el || !src) return

  const flat   = `<svg data-role="flat" x="0" y="0" width="96" height="96" viewBox="0 0 96 96">${src.innerHTML}</svg>`
  const circle = `<circle data-role="circle" cx="48" cy="48" r="48" fill="var(--bg, #52525b)"/>`
  const rect   = `<rect data-role="rect" x="0" y="0" width="96" height="96" rx="14" fill="var(--bg, #52525b)"/>`
  const width  = Math.ceil(96 + 20 + state.title_parts.join(state.sep).length * 42 * 0.75 + 8)
  const svg    = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} 96">` +
                 `${rect}${circle}${flat}${extract_title()}</svg>`

  logo_card_el.querySelector('.panel.light .main').innerHTML = instance(svg, 100)
  logo_card_el.querySelector('.panel.dark .main').innerHTML = instance(svg, 101)
}

// --- Apply tuner state to every card's live SVG DOM ---

function apply() {
  // Phase 1: finalize every template card's own layer transforms first, so the
  // logo card (phase 2) flattens an already-up-to-date source, never a stale
  // one-cycle-behind copy of the selected card
  for (const card of document.querySelectorAll('.card[data-index]')) {
    const index = +card.dataset.index
    for (const el of card.querySelectorAll('[data-role]')) {
      const c = (comps[index] || {})[el.dataset.role]
      if (!c) continue
      el.style.display = c.show ? '' : 'none'
      if (c.ink) el.setAttribute('fill', ink_css(c.ink))
      const size = +el.dataset.size * c.scale
      el.setAttribute('transform', `translate(${48 + +el.dataset.dx + c.dx - size * 48} ` +
                                   `${48 + c.dy - size * 48}) scale(${size * 6})`)
    }
  }

  // Phase 2: rebuild the logo card from the now-current selection, then tune
  // its own components. The rebuilt flat/rect/circle nest fresh each time, so
  // any embedded solid/frame/fore nodes from the flattened icon have no entry
  // in `logo` and are correctly skipped (they're frozen, not re-tuned here).
  rebuild_logo_dom()
  for (const el of document.getElementById('logo-card').querySelectorAll('[data-role]')) {
    const role = el.dataset.role
    if (role === 'title') { apply_title(el); continue }
    const c = logo[role]
    if (!c) continue

    el.style.display = c.show ? '' : 'none'
    if (c.ink) el.setAttribute('fill', ink_css(c.ink))

    if (role === 'rect') {
      // Width is a fraction of the logo's own (wider, title-inclusive) canvas
      // width, not a fixed 96 — otherwise the shape could never reach full width
      const vbw = el.ownerSVGElement.viewBox.baseVal.width
      const w = vbw * c.w, h = 96 * c.h
      el.setAttribute('width', w); el.setAttribute('height', h)
      el.setAttribute('x', (vbw - w) / 2 + c.dx); el.setAttribute('y', (96 - h) / 2 + c.dy)
      el.setAttribute('rx', c.rx)
    } else if (role === 'circle') {
      const vbw = el.ownerSVGElement.viewBox.baseVal.width
      el.setAttribute('cx', vbw / 2 + c.dx)
      el.setAttribute('cy', 48 + c.dy)
      el.setAttribute('r', 48 * c.scale)
    } else if (role === 'flat') {
      const w = 96 * c.scale
      el.setAttribute('width', w); el.setAttribute('height', w)
      el.setAttribute('x', 48 + c.dx - w / 2); el.setAttribute('y', 48 + c.dy - w / 2)
    }
  }
}

function apply_title(text) {
  // Per-part styling. Color is deliberately NOT assigned from primary/secondary
  // here: title text sits directly on the page (not a painted icon backing), so
  // it keeps inheriting currentColor from its <text> parent — that panel-native
  // color is guaranteed to contrast (dark text on the light panel, light text on
  // the dark one), whereas the secondary/fg color can be near-white and vanish
  // against the light panel's own near-white background.
  text.querySelectorAll('tspan').forEach((span, i) => {
    const p = parts[i]
    if (!p) return
    span.style.display = p.show ? '' : 'none'
    span.setAttribute('font-family', state.typesets[p.typeset])
    span.setAttribute('font-weight', p.weight)
    span.setAttribute('font-size', 42 * p.scale)
    span.setAttribute('dx', p.dx)
  })
}

// --- Save ---

function bake(svg) {
  return svg.replace(/var\(--fg[^)]*\)/g, css_hsl(current.fg))
            .replace(/var\(--bg[^)]*\)/g, css_hsl(current.bg))
            .replace(/var\(--ac[^)]*\)/g, css_hsl(current.ac))
}

function serialize(el) {
  return new XMLSerializer().serializeToString(el)
}

function fit_logo(el) {
  // Clone the tuned logo with its viewBox fitted to the actual content width
  const clone = el.cloneNode(true)
  const box = el.getBBox()
  clone.setAttribute('viewBox', `0 0 ${Math.ceil(box.x + box.width + 8)} 96`)
  return clone
}

function rasterize(svg, px) {
  // Draw the baked SVG onto a canvas at px size and return a PNG data URL
  return new Promise((resolve, reject) => {
    const sized = svg.replace('<svg ', `<svg width="${px}" height="${px}" `)
    const url = URL.createObjectURL(new Blob([sized], { type: 'image/svg+xml' }))
    const img = new Image()
    img.onload = () => {
      const canvas = Object.assign(document.createElement('canvas'), { width: px, height: px })
      canvas.getContext('2d').drawImage(img, 0, 0, px, px)
      URL.revokeObjectURL(url)
      resolve(canvas.toDataURL('image/png'))
    }
    img.onerror = () => reject(new Error('svg rasterization failed'))
    img.src = url
  })
}

async function save_logo() {
  try {
    const cand = state.candidates[selected]
    const icon_src = document.querySelector(`.card[data-index="${selected}"] .panel.light .main svg`)
    const svg_icon = bake(serialize(icon_src))
    const logo_svg_el = document.querySelector('#logo-card .panel.light .main svg')
    const svg_logo = bake(serialize(fit_logo(logo_svg_el)))
    const pngs = { 16: await rasterize(svg_icon, 16), 32: await rasterize(svg_icon, 32) }
    const out = await api('/api/save', {
      index: selected, scheme: current.scheme,
      colors: { fg: css_hsl(current.fg), bg: css_hsl(current.bg) },
      icons: { ...cand.icons, ...chosen[selected] }, svg_icon, svg_logo, pngs,
    })
    status(`Saved: ${out.saved.join(', ')}`)
  } catch (err) {
    status(`Save failed: ${err.message}`)
  }
}

// --- Regenerate / theme / status ---

async function regenerate() {
  const raw = document.getElementById('seed').value.trim()
  const seed = raw && Number.isInteger(+raw) && +raw !== state.seed ? +raw : undefined
  state = await api('/api/regenerate', seed === undefined ? {} : { seed })
  for (const k of Object.keys(chosen)) delete chosen[k]  // fresh icons on regenerate
  render()
  apply_colors()
}

function status(text) {
  const el = document.getElementById('status')
  el.textContent = text
  el.style.display = 'block'
  clearTimeout(status.timer)
  status.timer = setTimeout(() => { el.style.display = 'none' }, 4000)
}

document.getElementById('regen').onclick = () => regenerate().catch(err => status(err.message))
document.getElementById('theme-toggle').onclick = () => {
  const root = document.documentElement
  root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark'
  document.getElementById('theme-toggle').textContent = root.dataset.theme === 'dark' ? '☀' : '☾'
}

// Swap the "mndicon" text for a saved brand logo.svg, if one exists in assets/
fetch('/assets/logo.svg').then(res => {
  if (res.ok) res.text().then(svg => { document.getElementById('brand').innerHTML = svg })
})

api('/api/candidates').then(data => {
  state = data
  set_scheme(state.schemes.find(s => s.name === 'grey'))
  render()
  render_color_rows()
}).catch(err => status(err.message))
</script>
</body>
